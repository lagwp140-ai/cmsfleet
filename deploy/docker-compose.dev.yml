services:
  postgres:
    image: postgres:16-alpine
    container_name: cmsfleet-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cmsfleet}
      POSTGRES_USER: ${POSTGRES_USER:-cmsfleet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cmsfleet}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cmsfleet} -d ${POSTGRES_DB:-cmsfleet}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: