services:
  postgres-test:
    image: postgres:16-alpine
    container_name: cmsfleet-postgres-test
    environment:
      POSTGRES_DB: cmsfleet_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cmsfleet_test"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - cmsfleet-postgres-test:/var/lib/postgresql/data

volumes:
  cmsfleet-postgres-test: